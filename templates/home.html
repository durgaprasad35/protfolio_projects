<html>
<body>
    <div class="login">
       <h1>Student Dropout Prediction</h1>

```
   <form action="{{ url_for('predict_datapoint')}}" method="post">

    <h2>Enter Student Details</h2>

    <!-- Numerical Inputs -->
    <div>
        <label>Age</label>
        <input type="number" name="Age" required>
    </div>

    <div>
        <label>Family Income</label>
        <input type="number" name="Family_Income" required>
    </div>

    <div>
        <label>Study Hours per Day</label>
        <input type="number" step="0.1" name="Study_Hours_per_Day" required>
    </div>

    <div>
        <label>Attendance Rate (%)</label>
        <input type="number" step="0.1" name="Attendance_Rate" required>
    </div>

    <div>
        <label>Assignment Delay Days</label>
        <input type="number" name="Assignment_Delay_Days" required>
    </div>

    <div>
        <label>Travel Time (Minutes)</label>
        <input type="number" name="Travel_Time_Minutes" required>
    </div>

    <div>
        <label>Stress Index</label>
        <input type="number" step="0.1" name="Stress_Index" required>
    </div>

    <div>
        <label>GPA</label>
        <input type="number" step="0.1" name="GPA" required>
    </div>

    <div>
        <label>Semester GPA</label>
        <input type="number" step="0.1" name="Semester_GPA" required>
    </div>

    <div>
        <label>CGPA</label>
        <input type="number" step="0.1" name="CGPA" required>
    </div>

    <!-- Categorical Inputs -->

    <div>
        <label>Gender</label>
        <select name="Gender" required>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
    </div>

    <div>
        <label>Internet Access</label>
        <select name="Internet_Access" required>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>
    </div>

    <div>
        <label>Part Time Job</label>
        <select name="Part_Time_Job" required>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>
    </div>

    <div>
        <label>Scholarship</label>
        <select name="Scholarship" required>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>
    </div>

    <div>
        <label>Semester</label>
        <input type="number" name="Semester" required>
    </div>

    <div>
        <label>Department</label>
        <input type="text" name="Department" required>
    </div>

    <div>
        <label>Parental Education</label>
        <input type="text" name="Parental_Education" required>
    </div>

    <br>

    <input type="submit" value="Predict Dropout">

</form>

<h2>
    Prediction: {{ results }}
</h2>
```

</body>
</html>
